<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keychain | Kinetic Logic Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .shake { animation: shake 0.15s ease-in-out 0s 2; }
        .modal-bg { backdrop-filter: blur(12px); background: rgba(0,0,0,0.7); }
        .toast-pop { animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-[#0a0a0a] text-gray-200 p-4 md:p-8 font-sans overflow-x-hidden">

    <div id="toast-container" class="fixed bottom-10 inset-x-0 flex justify-center z-[100] hidden">
        <div class="toast-pop bg-red-600 text-white px-8 py-4 rounded-2xl shadow-2xl font-bold border border-red-400">
            Authentication Failed: Please check your credentials.
        </div>
    </div>

    <div id="auth-container" class="w-full max-w-md mx-auto mt-20">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-white tracking-tight text-center">Password Keychain</h1>
            <p class="text-blue-500 text-xs tracking-widest mt-2 uppercase font-bold text-center">Kinetic Logic Labs</p>
        </div>
        <div id="login-card" class="bg-[#171717] border border-[#262626] p-8 rounded-[2.5rem] shadow-2xl">
            <div class="space-y-4">
                <input id="auth-user" type="text" placeholder="Username" class="w-full bg-[#0a0a0a] border border-[#262626] p-4 rounded-2xl text-white outline-none focus:border-blue-500">
                <input id="auth-pw" type="password" placeholder="Password" class="w-full bg-[#0a0a0a] border border-[#262626] p-4 rounded-2xl text-white outline-none focus:border-blue-500">
            </div>
            <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl mt-8 transition-all active:scale-95">ACCESS VAULT</button>
            <button onclick="handleRegister()" class="w-full text-gray-500 text-xs mt-4 hover:text-white uppercase font-bold tracking-widest">Create New Account</button>
        </div>
    </div>

    <div id="vault-screen" class="hidden w-full max-w-5xl mx-auto">
        <div class="flex justify-between items-end mb-10">
            <h1 class="text-4xl font-black text-white tracking-tight">My Vault</h1>
            <div id="admin-badge" class="hidden bg-red-600 text-[10px] font-black px-3 py-1 rounded-full uppercase">Admin</div>
        </div>
        
        <div id="admin-panel" class="hidden bg-red-950/20 border border-red-900/30 p-8 rounded-[2rem] mb-10">
            <h3 class="text-red-500 text-xs font-black mb-4 uppercase tracking-widest">User Management (Admin Only)</h3>
            <div id="user-list" class="space-y-2"></div>
        </div>

        <div id="vault-grid" class="grid gap-4"></div>
    </div>

    <script>
        const API_URL = "https://sphhognczswchindrpua.supabase.co/functions/v1/keychain";
        let currentUser = "";
        let userRole = "user";

        function showShake() {
            const card = document.getElementById('login-card');
            const toast = document.getElementById('toast-container');
            card.classList.add('shake');
            toast.classList.remove('hidden');
            setTimeout(() => {
                card.classList.remove('shake');
                toast.classList.add('hidden');
            }, 3000);
        }

        async function handleLogin() {
            const u = document.getElementById('auth-user').value;
            const p = document.getElementById('auth-pw').value;
            const res = await fetch(`${API_URL}/auth`, {
                method: 'POST',
                body: JSON.stringify({ username: u, password: p })
            });
            if (res.ok) {
                const data = await res.json();
                currentUser = u;
                userRole = data.role;
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('vault-screen').classList.remove('hidden');
                if (userRole === 'admin') {
                    document.getElementById('admin-badge').classList.remove('hidden');
                    showAdminPanel();
                }
                loadVault();
            } else {
                showShake();
            }
        }

        async function handleRegister() {
            const u = document.getElementById('auth-user').value;
            const p = document.getElementById('auth-pw').value;
            const res = await fetch(`${API_URL}/create-account`, {
                method: 'POST',
                body: JSON.stringify({ username: u, password: p })
            });
            if (res.ok) alert("Account Created! Now Log In.");
        }

        async function showAdminPanel() {
            document.getElementById('admin-panel').classList.remove('hidden');
            const res = await fetch(`${API_URL}/admin-list-users`, {
                method: 'POST',
                body: JSON.stringify({ adminUser: currentUser })
            });
            const users = await res.json();
            document.getElementById('user-list').innerHTML = users.map(u => `
                <div class="flex justify-between items-center bg-black/40 p-4 rounded-xl border border-white/5">
                    <span class="font-bold">${u.username} <span class="text-gray-600 text-xs">(${u.role})</span></span>
                    ${u.username !== currentUser ? `<button onclick="deleteUser('${u.username}')" class="text-red-500 text-xs font-black uppercase">Delete</button>` : ''}
                </div>
            `).join('');
        }

        async function deleteUser(target) {
            if (!confirm(`Delete user ${target}?`)) return;
            await fetch(`${API_URL}/admin-delete-user`, {
                method: 'POST',
                body: JSON.stringify({ adminUser: currentUser, targetUser: target })
            });
            showAdminPanel();
        }
    </script>
</body>
</html>
