<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keychain | Kinetic Logic Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .shake { animation: shake 0.15s ease-in-out 0s 2; }
        
        /* Warning Toast Animation */
        .toast-pop { animation: slideUp 0.4s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-[#0a0a0a] text-gray-200 p-4 md:p-8 font-sans overflow-x-hidden">

    <div id="wrong-pw-toast" class="hidden fixed bottom-10 inset-x-0 flex justify-center z-[100]">
        <div class="toast-pop bg-red-600 text-white px-8 py-4 rounded-2xl shadow-2xl font-black uppercase tracking-widest border border-red-400">
            ⚠️ Authentication Failed: Wrong Password
        </div>
    </div>

    <div id="auth-container" class="w-full max-w-md mx-auto mt-20">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-white tracking-tight">Password Keychain</h1>
            <p class="text-blue-500 text-[10px] tracking-widest mt-2 uppercase font-black">By Kinetic Logic Labs</p>
        </div>
        <div id="login-card" class="bg-[#171717] border border-[#262626] p-8 rounded-[2.5rem] shadow-2xl">
            <div class="space-y-4">
                <input id="auth-user" type="text" placeholder="Username" class="w-full bg-[#0a0a0a] border border-[#262626] p-4 rounded-2xl text-white outline-none focus:border-blue-500 transition-colors">
                
                <div class="relative">
                    <input id="auth-pw" type="password" placeholder="Password" class="w-full bg-[#0a0a0a] border border-[#262626] p-4 rounded-2xl text-white outline-none focus:border-blue-500 transition-colors">
                    <button onclick="toggleVisibility('auth-pw')" class="absolute right-4 top-4 text-gray-500 hover:text-white transition-colors">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                    </button>
                </div>
            </div>
            <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl mt-8 transition-all active:scale-95">ACCESS VAULT</button>
        </div>
    </div>

    <script>
        const API_URL = "https://sphhognczswchindrpua.supabase.co/functions/v1/keychain";

        function toggleVisibility(id) {
            const el = document.getElementById(id);
            const icon = document.getElementById('eye-icon');
            if (el.type === 'password') {
                el.type = 'text';
                icon.style.opacity = "0.4"; // Visual cue for "open"
            } else {
                el.type = 'password';
                icon.style.opacity = "1";
            }
        }

        async function handleLogin() {
            const u = document.getElementById('auth-user').value;
            const p = document.getElementById('auth-pw').value;
            const card = document.getElementById('login-card');
            const toast = document.getElementById('wrong-pw-toast');

            try {
                const res = await fetch(`${API_URL}/auth`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });

                if (res.ok) {
                    // Success logic
                    document.getElementById('auth-container').classList.add('hidden');
                    // ... show vault
                } else {
                    // Shake and Show Bottom Warning
                    card.classList.add('shake');
                    toast.classList.remove('hidden');
                    
                    setTimeout(() => {
                        card.classList.remove('shake');
                        toast.classList.add('hidden');
                    }, 3000);
                }
            } catch (e) {
                console.error("API Connection Error");
            }
        }
    </script>
</body>
</html>
