<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keychain | Kinetic Logic Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .shake { animation: shake 0.15s ease-in-out 0s 2; }
        .modal-bg { backdrop-filter: blur(12px); background: rgba(0,0,0,0.7); }
    </style>
</head>
<body class="bg-[#0a0a0a] text-gray-200 p-4 md:p-8 font-sans">

    <div id="auth-container" class="w-full max-w-md mx-auto mt-20">
        <div id="login-card" class="bg-[#171717] border border-[#262626] p-8 rounded-[2.5rem] shadow-2xl">
            <h1 class="text-2xl font-black text-white mb-6 text-center">Unlock Vault</h1>
            
            <div class="space-y-4">
                <input id="auth-user" type="text" placeholder="Username" class="w-full bg-[#0a0a0a] border border-[#262626] p-4 rounded-2xl text-white outline-none">
                <div class="relative">
                    <input id="auth-pw" type="password" placeholder="Password" class="w-full bg-[#0a0a0a] border border-[#262626] p-4 rounded-2xl text-white outline-none">
                    <button onclick="toggleVisibility('auth-pw')" class="absolute right-4 top-4 text-gray-500 hover:text-white">
                        <svg id="eye-auth-pw" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                    </button>
                </div>
                <input id="reg-key" type="password" placeholder="Registration Key (New Users Only)" class="w-full bg-[#0a0a0a] border border-[#262626] p-4 rounded-2xl text-white outline-none text-xs">
            </div>

            <div class="flex gap-2 mt-8">
                <button onclick="handleLogin()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition-all">LOGIN</button>
                <button onclick="handleRegister()" class="flex-1 bg-[#262626] hover:bg-[#333] text-white font-black py-4 rounded-2xl transition-all">REGISTER</button>
            </div>
        </div>
    </div>

    <div id="settings-panel" class="hidden bg-[#171717] border border-[#262626] p-8 rounded-[2rem] mt-10">
        <h3 class="text-blue-500 text-[10px] font-black uppercase tracking-widest mb-4">Profile Settings</h3>
        <div class="grid gap-4">
            <input id="new-profile-user" placeholder="Update Username" class="bg-black border border-[#262626] p-4 rounded-xl text-sm">
            <input id="new-profile-pw" type="password" placeholder="Update Password" class="bg-black border border-[#262626] p-4 rounded-xl text-sm">
            <button onclick="updateProfile()" class="bg-blue-600 py-4 rounded-xl font-black text-xs uppercase tracking-widest">Update Credentials</button>
        </div>
    </div>

    <script>
        const API_URL = "https://sphhognczswchindrpua.supabase.co/functions/v1/keychain";

        function toggleVisibility(id) {
            const input = document.getElementById(id);
            const svg = document.getElementById('eye-' + id);
            if (input.type === 'password') {
                input.type = 'text';
                // Add the "slash" to the eye via path change or opacity
                svg.style.opacity = "0.5";
            } else {
                input.type = 'password';
                svg.style.opacity = "1";
            }
        }

        async function handleRegister() {
            const u = document.getElementById('auth-user').value;
            const p = document.getElementById('auth-pw').value;
            const k = document.getElementById('reg-key').value;
            
            if(!k) { alert("Registration Key Required to prevent spam."); return; }

            const res = await fetch(`${API_URL}/create-account`, {
                method: 'POST',
                body: JSON.stringify({ username: u, password: p, regKey: k })
            });

            if (res.ok) alert("Account Created! You can now Login.");
            else alert(await res.text());
        }

        async function updateProfile() {
            const newU = document.getElementById('new-profile-user').value;
            const newP = document.getElementById('new-profile-pw').value;
            
            const res = await fetch(`${API_URL}/update-profile`, {
                method: 'POST',
                body: JSON.stringify({ oldUsername: currentUser, newUsername: newU, newPassword: newP })
            });

            if (res.ok) {
                alert("Profile Updated! Please log in again.");
                location.reload();
            }
        }
    </script>
</body>
</html>
