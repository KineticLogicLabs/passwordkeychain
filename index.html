<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Keychain | Kinetic Logic Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .shake { animation: shake 0.15s ease-in-out 0s 2; }
        .toast-pop { animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .spinner { border: 3px solid rgba(255, 255, 255, 0.1); border-left-color: #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #262626; border-radius: 10px; }
        
        /* Smooth Panel Transition */
        .settings-transition {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transform: translateY(-10px);
        }
        .settings-transition.show {
            max-height: 2000px;
            opacity: 1;
            transform: translateY(0);
            margin-bottom: 3rem;
        }

        /* Interactive Buttons */
        .btn-interact {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-interact:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="bg-[#0a0a0a] text-gray-200 p-4 md:p-8 font-sans selection:bg-blue-500/30">

    <div id="loading-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] flex items-center justify-center hidden">
        <div class="flex flex-col items-center gap-4">
            <div class="spinner"></div>
            <p class="text-[10px] font-black uppercase tracking-[0.3em] text-blue-500">Processing</p>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-10 inset-x-0 flex justify-center z-[100] hidden">
        <div class="toast-pop bg-red-600 text-white px-8 py-4 rounded-2xl shadow-2xl font-black uppercase tracking-widest border border-red-400 text-center text-xs">
            Authentication Failed
        </div>
    </div>

    <div id="auth-container" class="w-full max-w-md mx-auto mt-20 transition-all duration-700">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-white tracking-tight">Password Keychain</h1>
            <p class="text-blue-500 text-[10px] tracking-widest mt-2 uppercase font-black">By Kinetic Logic Labs</p>
        </div>
        <div id="login-card" class="bg-[#171717] border border-[#262626] p-8 rounded-[2.5rem] shadow-2xl">
            <div class="space-y-4">
                <input id="auth-user" type="text" placeholder="Username" class="w-full bg-[#0a0a0a] border border-[#262626] p-4 rounded-2xl text-white outline-none focus:border-blue-500 transition-all duration-300">
                <div class="relative">
                    <input id="auth-pw" type="password" placeholder="Password" class="w-full bg-[#0a0a0a] border border-[#262626] p-4 rounded-2xl text-white outline-none focus:border-blue-500 transition-all duration-300">
                    <button onclick="toggleVisibility('auth-pw')" class="absolute right-4 top-4 text-gray-500 hover:text-white transition-colors duration-300">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                            <path id="eye-open" stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            <path id="eye-slash" class="hidden" stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.822 7.822L21 21m-2.228-2.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                        </svg>
                    </button>
                </div>
            </div>
            <button id="login-btn" onclick="handleLogin()" class="btn-interact w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl mt-8 uppercase tracking-widest text-xs">Access Vault</button>
        </div>
    </div>

    <div id="vault-screen" class="hidden w-full max-w-6xl mx-auto opacity-0 transition-opacity duration-700">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-12">
            <div>
                <p class="text-blue-500 text-[10px] tracking-widest uppercase font-black mb-1">Kinetic Logic Labs</p>
                <h1 class="text-4xl font-black text-white tracking-tight">My Vault</h1>
                <p id="vault-count" class="text-xs text-gray-500 font-mono mt-1">0 encrypted records</p>
            </div>
            <div class="flex gap-4">
                <button onclick="toggleSettings()" class="btn-interact bg-[#171717] border border-[#262626] px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-[#212121]">Settings</button>
                <button onclick="location.reload()" class="btn-interact bg-red-950/30 text-red-500 border border-red-900/40 px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-red-900/40">Lock</button>
            </div>
        </div>

        <div id="settings-panel" class="settings-transition space-y-8">
            <div class="bg-[#171717] border border-white/5 p-8 rounded-[2.5rem] shadow-2xl">
                <div class="grid md:grid-cols-2 gap-10">
                    <div>
                        <h3 class="text-blue-500 text-[10px] font-black mb-4 uppercase tracking-widest">Update Credentials</h3>
                        <div class="space-y-3">
                            <input id="update-user" placeholder="New Username" class="w-full bg-[#0a0a0a] border border-[#262626] p-4 rounded-xl text-sm text-white outline-none focus:border-blue-500 transition-colors">
                            <input id="update-pw" type="password" placeholder="New Password" class="w-full bg-[#0a0a0a] border border-[#262626] p-4 rounded-xl text-sm text-white outline-none focus:border-blue-500 transition-colors">
                            <button onclick="updateCredentials()" class="btn-interact w-full bg-blue-600 py-4 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-500">Apply Changes</button>
                        </div>
                    </div>
                    <div id="admin-section" class="hidden border-l border-white/5 md:pl-10">
                        <h3 class="text-red-500 text-[10px] font-black mb-4 uppercase tracking-widest">Admin: User Registration</h3>
                        <div class="space-y-3">
                            <input id="reg-user" placeholder="Register Username" class="w-full bg-[#0a0a0a] border border-[#262626] p-4 rounded-xl text-sm text-white outline-none focus:border-red-500 transition-colors">
                            <input id="reg-pw" type="password" placeholder="Register Password" class="w-full bg-[#0a0a0a] border border-[#262626] p-4 rounded-xl text-sm text-white outline-none focus:border-red-500 transition-colors">
                            <button onclick="adminCreateAccount()" class="btn-interact w-full bg-[#262626] border border-white/5 py-4 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-[#333]">Add Standard User</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="user-management-panel" class="hidden bg-[#171717] border border-white/5 p-8 rounded-[2.5rem] shadow-2xl">
                <h3 class="text-red-500 text-[10px] font-black mb-6 uppercase tracking-widest">Admin: Manage All Accounts</h3>
                <div id="admin-user-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Loaded dynamically -->
                </div>
            </div>
        </div>

        <div class="bg-[#171717] border border-[#262626] p-8 rounded-[2.5rem] mb-12 shadow-xl">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <input id="dom" placeholder="Domain" class="bg-[#0a0a0a] border border-[#262626] p-4 rounded-xl text-sm text-white outline-none focus:border-blue-500 transition-colors">
                <input id="usr" placeholder="Username" class="bg-[#0a0a0a] border border-[#262626] p-4 rounded-xl text-sm text-white outline-none focus:border-blue-500 transition-colors">
                <input id="pwd" placeholder="Password" class="bg-[#0a0a0a] border border-[#262626] p-4 rounded-xl text-sm text-white outline-none focus:border-blue-500 transition-colors">
                <select id="cat" class="bg-[#0a0a0a] border border-[#262626] p-4 rounded-xl text-sm text-white outline-none cursor-pointer hover:border-blue-500 transition-colors"></select>
            </div>
            <button onclick="saveEntry()" class="btn-interact w-full bg-blue-600 font-black py-5 rounded-2xl hover:bg-blue-500 text-[11px] tracking-[0.2em] uppercase">Save to Vault</button>
        </div>

        <div id="vault-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        const API_URL = "https://sphhognczswchindrpua.supabase.co/functions/v1/keychain";
        let currentUser = "";
        let userRole = "user";
        let currentCategories = ["Personal", "Work", "Finance", "Social"];

        function showLoading(show) { document.getElementById('loading-overlay').classList.toggle('hidden', !show); }
        function toggleVisibility(id) {
            const el = document.getElementById(id);
            const openPath = document.getElementById('eye-open');
            const slashPath = document.getElementById('eye-slash');
            if (el.type === 'password') { el.type = 'text'; openPath.classList.add('hidden'); slashPath.classList.remove('hidden'); }
            else { el.type = 'password'; openPath.classList.remove('hidden'); slashPath.classList.add('hidden'); }
        }
        function triggerError() {
            const card = document.getElementById('login-card');
            const toast = document.getElementById('toast-container');
            card.classList.add('shake'); toast.classList.remove('hidden');
            setTimeout(() => { card.classList.remove('shake'); toast.classList.add('hidden'); }, 3000);
        }

        async function handleLogin() {
            const u = document.getElementById('auth-user').value;
            const p = document.getElementById('auth-pw').value;
            if(!u || !p) { triggerError(); return; }
            showLoading(true);
            try {
                const res = await fetch(`${API_URL}/auth`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
                if (res.ok) {
                    const data = await res.json();
                    currentUser = u;
                    userRole = data.role || "user";
                    currentCategories = data.categories || currentCategories;
                    renderCategories();
                    if(userRole === 'admin') {
                        document.getElementById('admin-section').classList.remove('hidden');
                        document.getElementById('user-management-panel').classList.remove('hidden');
                        loadAdminUserList();
                    }
                    document.getElementById('auth-container').classList.add('opacity-0');
                    setTimeout(() => {
                        document.getElementById('auth-container').classList.add('hidden');
                        document.getElementById('vault-screen').classList.remove('hidden');
                        setTimeout(() => document.getElementById('vault-screen').classList.remove('opacity-0'), 50);
                        loadVault();
                    }, 500);
                } else { triggerError(); }
            } catch (err) { triggerError(); } finally { showLoading(false); }
        }

        function renderCategories() {
            const sel = document.getElementById('cat');
            sel.innerHTML = currentCategories.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        async function saveEntry() {
            const dom = document.getElementById('dom'); const usr = document.getElementById('usr'); const pwd = document.getElementById('pwd'); const cat = document.getElementById('cat');
            if(!dom.value || !pwd.value) return;
            showLoading(true);
            const entry = { domain: dom.value, username: usr.value, password: pwd.value, category: cat.value };
            await fetch(`${API_URL}/save`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ currentUser, entry }) });
            dom.value = ""; usr.value = ""; pwd.value = "";
            loadVault();
            showLoading(false);
        }

        async function loadVault() {
            const list = document.getElementById('vault-list');
            const countEl = document.getElementById('vault-count');
            try {
                const res = await fetch(`${API_URL}/list`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ currentUser }) });
                const data = await res.json();
                countEl.innerText = data.length + ' encrypted records';
                list.innerHTML = data.map(item => `
                    <div class="bg-[#171717] border border-white/5 p-8 rounded-[2.5rem] hover:border-blue-500/50 transition-all duration-300 group relative">
                        <div class="flex justify-between items-start mb-6 text-[10px] font-black uppercase tracking-widest">
                            <div class="text-blue-500 bg-blue-500/10 px-3 py-1 rounded-lg">${item.category}</div>
                            <button onclick="deleteEntry('${item.domain}')" class="text-gray-600 hover:text-red-500 transition-colors">Delete</button>
                        </div>
                        <div class="text-2xl font-black text-white mb-1">${item.domain}</div>
                        <div class="text-sm text-gray-500 font-mono mb-6 truncate opacity-60">${item.username}</div>
                        <button onclick="copyToClipboard('${item.password}')" class="btn-interact w-full bg-black border border-white/5 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-600">Copy Password</button>
                    </div>
                `).join('');
            } catch (err) {}
        }

        async function deleteEntry(domain) {
            if(!confirm("Delete this entry?")) return;
            showLoading(true);
            await fetch(`${API_URL}/delete`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ currentUser, domain }) });
            loadVault();
            showLoading(false);
        }

        async function loadAdminUserList() {
            const container = document.getElementById('admin-user-list');
            try {
                const res = await fetch(`${API_URL}/list-all-users`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ adminUser: currentUser }) });
                const data = await res.json();
                container.innerHTML = data.map(u => `
                    <div class="bg-black/40 border border-white/5 p-6 rounded-[2rem] space-y-4 hover:border-red-900/30 transition-all duration-300 group">
                        <div class="flex justify-between items-center">
                            <span class="text-white font-black text-lg tracking-tight">${u.username}</span>
                            <span class="text-[9px] font-black uppercase tracking-[0.2em] px-2 py-1 rounded border ${u.role === 'admin' ? 'text-red-500 border-red-500/30 bg-red-500/10' : 'text-gray-500 border-white/10'}">${u.role}</span>
                        </div>
                        <div class="space-y-1">
                            <p class="text-[9px] font-black text-gray-600 uppercase tracking-widest">Master Password</p>
                            <p class="text-xs font-mono text-gray-400 truncate">${u.password}</p>
                        </div>
                        <div class="pt-2 border-t border-white/5 flex justify-between items-center">
                            <span class="text-[10px] font-black text-blue-500 uppercase">${u.entryCount} Entries</span>
                            ${u.username !== currentUser ? `
                                <button onclick="adminDeleteUser('${u.username}')" class="btn-interact text-[9px] font-black uppercase tracking-widest bg-red-950/30 text-red-500 px-4 py-2 rounded-xl border border-red-900/40 hover:bg-red-900 transition-all">Terminate</button>
                            ` : ''}
                        </div>
                    </div>
                `).join('');
            } catch (err) {}
        }

        async function adminDeleteUser(target) {
            if(!confirm(`Permanently delete account: ${target}?`)) return;
            showLoading(true);
            await fetch(`${API_URL}/admin-delete-user`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ adminUser: currentUser, targetUser: target }) });
            loadAdminUserList();
            showLoading(false);
        }

        async function updateCredentials() {
            const newU = document.getElementById('update-user').value;
            const newP = document.getElementById('update-pw').value;
            if(!newU || !newP) return;
            showLoading(true);
            const res = await fetch(`${API_URL}/update-profile`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ oldUsername: currentUser, newUsername: newU, newPassword: newP }) });
            if(res.ok) { alert("Credentials updated. Log in again."); location.reload(); }
            showLoading(false);
        }

        async function adminCreateAccount() {
            const u = document.getElementById('reg-user').value; const p = document.getElementById('reg-pw').value;
            if(!u || !p) return;
            showLoading(true);
            const res = await fetch(`${API_URL}/create-account`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ adminUser: currentUser, newUsername: u, newPassword: p }) });
            if(res.ok) { alert("User registered."); document.getElementById('reg-user').value = ""; document.getElementById('reg-pw').value = ""; loadAdminUserList(); }
            showLoading(false);
        }

        function copyToClipboard(text) {
            const temp = document.createElement('input'); document.body.appendChild(temp);
            temp.value = text; temp.select(); document.execCommand('copy');
            document.body.removeChild(temp);
        }

        function toggleSettings() { 
            const panel = document.getElementById('settings-panel');
            panel.classList.toggle('show');
        }
    </script>
</body>
</html>
